<!DOCTYPE html>
<html>
<head>
    <title>Profile Page</title>
</head>
<body>

<h1>Profile</h1>

<div id="profile">
    Loading...
</div>

<script>
// Get profile name from URL (example: ?user=john)
const params = new URLSearchParams(window.location.search);
const user = params.get("user") || "john"; // default

fetch(`profiles/${user}.txt`)
  .then(response => response.text())
  .then(text => {
      const data = {};

      text.split("\n").forEach(line => {
          const [key, value] = line.split("=");
          if (key && value) {
              data[key.trim()] = value.trim();
          }
      });

      document.getElementById("profile").innerHTML = `
          <h2>${data.name}</h2>
          <p><strong>Role:</strong> ${data.role}</p>
          <p><strong>Email:</strong> ${data.email}</p>
          <p>${data.about}</p>
      `;
  })
  .catch(() => {
      document.getElementById("profile").innerHTML = "Profile not found";
  });
</script>

</body>
</html>
